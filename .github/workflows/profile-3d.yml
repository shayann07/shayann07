name: GitHub-Profile-3D-Contrib

on:
  schedule:
    - cron: "0 18 * * *" # Runs daily at 18:00 UTC
  workflow_dispatch:      # Allows manual triggering

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-3d-contrib
    steps:
      - uses: actions/checkout@v4
      - uses: yoshi389111/github-profile-3d-contrib@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
      - name: Make background transparent
        run: |
          sed -i -E 's/\.fill-bg\s*\{\s*fill:\s*[^;}]+;?\s*\}/.fill-bg { fill: none; }/g' profile-3d-contrib/*.svg
          sed -i -E 's/\.stroke-bg\s*\{\s*stroke:\s*[^;}]+;?\s*\}/.stroke-bg { stroke: none; }/g' profile-3d-contrib/*.svg
      - name: Commit & Push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A .
          if git commit -m "Generated GitHub Profile 3D Contrib (Transparent)"; then
            git push
          fi
